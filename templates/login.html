<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login — Greenwave Traders</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0b0e17; --bg2: #111520; --bg3: #161c2e;
  --border: #1f2a42; --border2: #2a3655;
  --text: #c8d0e8; --text2: #6b7499;
  --accent: #3b82f6; --accent-glow: rgba(59,130,246,0.5);
  --font: 'Inter', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg); color: var(--text); font-family: var(--font);
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  background-image: radial-gradient(circle at 50% -20%, rgba(59,130,246,0.15) 0%, transparent 50%);
}
.login-box {
  background: linear-gradient(135deg, var(--bg2), var(--bg3));
  border: 1px solid var(--border);
  padding: 40px; border-radius: 20px; width: 100%; max-width: 400px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.05);
  animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
.logo-icon {
  width: 48px; height: 48px;
  background: linear-gradient(135deg, #3b82f6, #8b5cf6);
  border-radius: 12px; display: flex; align-items: center; justify-content: center;
  font-size: 24px; box-shadow: 0 0 20px rgba(59,130,246,0.4);
  margin-bottom: 24px;
}
h1 { font-size: 24px; font-weight: 800; color: #fff; margin-bottom: 8px; letter-spacing: -0.02em; }
p { font-size: 13px; color: var(--text2); margin-bottom: 32px; }
.form-group { margin-bottom: 20px; }
label { display: block; font-size: 11px; font-weight: 600; color: var(--text2); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
input {
  width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--border2);
  border-radius: 10px; padding: 14px 16px; color: #fff; font-family: var(--font); font-size: 14px;
  transition: all 0.2s; box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
}
input:focus {
  outline: none; border-color: var(--accent); background: rgba(59,130,246,0.05);
  box-shadow: 0 0 0 3px rgba(59,130,246,0.15), inset 0 2px 4px rgba(0,0,0,0.2);
}
.btn {
  width: 100%; background: linear-gradient(135deg, #3b82f6, #2563eb);
  color: #fff; border: none; padding: 14px; border-radius: 10px;
  font-size: 14px; font-weight: 600; font-family: var(--font);
  cursor: pointer; transition: all 0.2s;
  box-shadow: 0 4px 14px rgba(59,130,246,0.4);
}
.btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(59,130,246,0.5); }
.btn:active { transform: translateY(0); }
.flash {
  background: rgba(239, 68, 68, 0.1); border-left: 4px solid #ef4444;
  color: #ef4444; padding: 12px 16px; border-radius: 6px; font-size: 12px; font-weight: 600;
  margin-bottom: 24px;
}
</style>
</head>
<body>
  <div class="login-box">
    <div class="logo-icon">🌊</div>
    <h1>Purchase Order</h1>
    <p>Sign in to your account</p>
    
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="flash">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('login', next=request.args.get('next')) }}">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="Enter username" required autofocus>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn">Sign In →</button>
    </form>
  </div>
</body>
</html>
