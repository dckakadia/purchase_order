# ============================================================
# Import Tools Portal — Nginx Configuration
# Place this at: /etc/nginx/sites-available/import-tools
# Then: sudo ln -s /etc/nginx/sites-available/import-tools /etc/nginx/sites-enabled/
# ============================================================

server {
    listen 80;
    server_name _;          # catches all hostnames / IP addresses

    client_max_body_size 50M;  # allow large file uploads (PDFs, images)

    # ── Portal Dashboard ─────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # ── GST GSTR-2B Reconciliation (port 5001) ───────────────────
    location /gst/ {
        proxy_pass         http://127.0.0.1:5001/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Script-Name /gst;
        proxy_read_timeout 120s;
    }

    # ── BOE Calculator (port 5002) — main page ───────────────────
    location /boe/ {
        proxy_pass         http://127.0.0.1:5002/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    # BOE API routes (called from JS at absolute /scan-* paths)
    location ~ ^/(scan-pi|scan-boe|scan-challan)$ {
        proxy_pass         http://127.0.0.1:5002;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    # ── Landing Cost Calculator (port 5003) ──────────────────────
    location /landing/ {
        proxy_pass         http://127.0.0.1:5003/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    # ── PO / Forwarder Dashboard (port 5005) ─────────────────────
    location /forwarder-dashboard {
        proxy_pass         http://127.0.0.1:5005;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    location /po/ {
        proxy_pass         http://127.0.0.1:5005/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    # ── PO API routes (port 5005) ──────────────────────────────
    location ~ ^/api/(shipments|forwarders|dashboard-stats|scan-invoice|quotations|suppliers|items|po|settings|next-po-number|export|import|analytics|lc-report|po-report) {
        proxy_pass         http://127.0.0.1:5005;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    # Landing Cost API routes
    location ~ ^/api/(calculate|parse-invoice|report)$ {
        proxy_pass         http://127.0.0.1:5003;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }
}
